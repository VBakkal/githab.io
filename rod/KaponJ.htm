<FONT SIZE=4 color="#703008" face=arial>



<P ALIGN="JUSTIFY">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Родился в ноябре 1843 года.
<P ALIGN="JUSTIFY">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Был женат на Мурат (Марие) Яковлевне Бурче, которая родила ему двух сыновей:<br>
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Якова и Давида;<br>
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;а также четырех дочерей:<br>
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Бикенеш, Сару, Раису и Бебюш. 
<P ALIGN="JUSTIFY">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Умер в 1910 году от халеры в Бахчисарае.
